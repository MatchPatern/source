name: Mirror to Codeberg
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git push https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/CodeMatch/source.git main --force
