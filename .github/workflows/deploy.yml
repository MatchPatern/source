name: Deploy to Juno

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      
      - name: Install Dependencies
        run: npm ci
      
      # NEW STEP: This will show a clear error if the token is invalid
      - name: Diagnose Juno
        env:
          JUNO_TOKEN: ${{ secrets.JUNO_TOKEN }}
        run: |
          if [ -z "$JUNO_TOKEN" ]; then
            echo "::error::JUNO_TOKEN secret is empty or not set in GitHub Secrets."
            exit 1
          else
            echo "JUNO_TOKEN is set (value hidden)."
          fi
      
      - name: Deploy to Juno
        uses: junobuild/juno-action@main
        with:
          args: hosting deploy
