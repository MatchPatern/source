name: Deploy to Juno

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Deploy to Juno
        uses: junobuild/juno-action@v0.6.10
        with:
          args: hosting deploy
          config: ./juno.config.json
        env:
          JUNO_TOKEN: ${{ secrets.JUNO_TOKEN }}
